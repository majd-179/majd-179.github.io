<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبتي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--surface:#0f0f1a;--surface2:#161625;--surface3:#1e1e30;--surface4:#252538;
  --border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.09);--border3:rgba(255,255,255,0.15);
  --text:#f0efe8;--text2:#b8b6cc;--muted:#666;--muted2:#888;
  --anime:#e8517a;--anime-bg:rgba(232,81,122,0.12);--anime-glow:rgba(232,81,122,0.25);
  --manga:#e879a0;--manga-bg:rgba(232,121,160,0.12);--manga-glow:rgba(232,121,160,0.25);
  --books:#4e9af1;--books-bg:rgba(78,154,241,0.12);--books-glow:rgba(78,154,241,0.25);
  --games:#51c96a;--games-bg:rgba(81,201,106,0.12);--games-glow:rgba(81,201,106,0.25);
  --films:#f5a623;--films-bg:rgba(245,166,35,0.12);--films-glow:rgba(245,166,35,0.25);
  --series:#a855f7;--series-bg:rgba(168,85,247,0.12);--series-glow:rgba(168,85,247,0.25);
  --music:#f97316;--music-bg:rgba(249,115,22,0.12);--music-glow:rgba(249,115,22,0.25);
  --youtube:#ff3c3c;--youtube-bg:rgba(255,60,60,0.1);--youtube-glow:rgba(255,60,60,0.2);
  --insta:#c13584;--insta-bg:rgba(193,53,132,0.12);--insta-glow:rgba(193,53,132,0.25);
  --accent:#7f77dd;--accent2:#534ab7;--accent-glow:rgba(127,119,221,0.2);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.12);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,0.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);
  --radius:18px;--radius-sm:10px;
}
.light{
  --bg:#f2f1f8;--surface:#fff;--surface2:#eceaf7;--surface3:#e2e0f0;--surface4:#d5d3e8;
  --border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.1);--border3:rgba(0,0,0,0.16);
  --text:#1a1830;--text2:#4a4870;--muted:#aaa;--muted2:#777;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(127,119,221,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(127,119,221,0.018) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-orbs::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(127,119,221,0.07) 0%,transparent 70%);top:-200px;right:-200px;animation:float1 20s ease-in-out infinite;}
.bg-orbs::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(232,81,122,0.05) 0%,transparent 70%);bottom:-150px;left:-150px;animation:float2 25s ease-in-out infinite;}
@keyframes float1{0%,100%{transform:translate(0,0);}50%{transform:translate(-40px,40px);}}
@keyframes float2{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-30px);}}

/* ══════════════════════════════════
   LAYOUT — كل page ليها id خاص
══════════════════════════════════ */
.page{display:none;position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:0 1.25rem 6rem;}
.page.active{display:block;}

/* ══ Shared Hero ══ */
.hero{padding:2rem 0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}
.hero-left{display:flex;align-items:center;gap:14px;}
.hero-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.hero-icon.lib-icon{background:linear-gradient(135deg,rgba(127,119,221,0.3),rgba(168,85,247,0.2));border:1px solid rgba(127,119,221,0.3);box-shadow:0 0 25px rgba(127,119,221,0.2);}
.hero-icon.social-icon{background:linear-gradient(135deg,rgba(249,115,22,0.3),rgba(193,53,132,0.2));border:1px solid rgba(249,115,22,0.3);box-shadow:0 0 25px rgba(249,115,22,0.2);}
.hero-title{font-family:'Cairo',sans-serif;font-size:26px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--text) 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-title.social-title{background:linear-gradient(135deg,var(--text) 30%,#f97316 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:12px;color:var(--muted2);margin-top:1px;}
.hero-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* ══ Icon button ══ */
.icon-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:17px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.icon-btn:hover{background:var(--surface3);border-color:var(--border3);}

/* ══ Bottom Nav (Tabs) ══ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:center;padding:0.6rem 1rem 1rem;background:linear-gradient(to top,var(--bg) 70%,transparent);}
.bottom-nav-inner{display:flex;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:5px;box-shadow:0 8px 32px rgba(0,0,0,0.4);backdrop-filter:blur(10px);}
.nav-tab{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:15px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active-lib{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(127,119,221,0.4);}
.nav-tab.active-social{background:linear-gradient(135deg,#f97316,#c13584);color:#fff;box-shadow:0 4px 14px rgba(249,115,22,0.3);}
.nav-tab .tab-cnt{font-size:11px;background:rgba(255,255,255,0.2);padding:1px 7px;border-radius:20px;font-weight:500;}

/* ══ Toolbar ══ */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem;}
.search-wrap{position:relative;flex:1;min-width:150px;}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;padding:10px 38px 10px 14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.sort-select{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;padding:9px 12px;outline:none;cursor:pointer;-webkit-appearance:none;}
.sort-select option{background:var(--surface2);}
.add-btn{border:none;border-radius:var(--radius-sm);padding:10px 20px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.add-btn.lib-add{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(127,119,221,0.3);}
.add-btn.lib-add:hover{box-shadow:0 6px 20px rgba(127,119,221,0.45);transform:translateY(-1px);}
.add-btn.social-add{background:linear-gradient(135deg,#f97316,#c13584);color:#fff;box-shadow:0 4px 14px rgba(249,115,22,0.3);}
.add-btn.social-add:hover{box-shadow:0 6px 20px rgba(249,115,22,0.4);transform:translateY(-1px);}

/* ══ Stats ══ */
.stats{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;text-align:center;transition:border-color 0.2s,transform 0.2s;flex:1;min-width:70px;}
.stat:hover{border-color:var(--border2);transform:translateY(-2px);}
.stat-num{font-family:'Cairo',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

/* ══ Cat nav ══ */
.cat-nav{display:flex;gap:5px;margin-bottom:1.5rem;flex-wrap:wrap;}
.cat-btn{flex:1;min-width:75px;padding:9px 8px;border-radius:var(--radius-sm);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:500;border:1px solid var(--border2);background:var(--surface);color:var(--muted2);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;position:relative;overflow:hidden;}
.cat-btn::before{content:'';position:absolute;inset:0;background:var(--cat-color,var(--accent));opacity:0;transition:opacity 0.2s;}
.cat-btn:hover{color:var(--text);border-color:var(--border3);}
.cat-btn:hover::before{opacity:0.06;}
.cat-btn.active{color:#fff;border-color:transparent;background:var(--cat-color,var(--accent));box-shadow:0 4px 14px var(--cat-glow,var(--accent-glow));font-weight:700;}
.cat-btn.active::before{opacity:0;}
.cat-btn .cnt{font-size:10px;background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:20px;font-weight:400;}
.cat-btn:not(.active) .cnt{background:rgba(127,119,221,0.08);}

/* ══ Section header ══ */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:1rem;flex-wrap:wrap;}
.section-title{font-family:'Cairo',sans-serif;font-size:19px;font-weight:900;display:flex;align-items:center;gap:9px;}
.cat-dot{width:8px;height:8px;border-radius:50%;background:var(--cat-color,var(--accent));box-shadow:0 0 8px var(--cat-color,var(--accent));}
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:5px 13px;border-radius:30px;font-family:'Tajawal',sans-serif;font-size:12px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.pill:hover{color:var(--text);}
.pill.active{background:var(--surface3);color:var(--text);border-color:var(--border3);font-weight:600;}

/* ══ Grid ══ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:13px;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ══ Library Card ══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:visible;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);position:relative;animation:cardIn 0.3s ease both;}
.card:hover{border-color:var(--cat-color-border,var(--border2));transform:translateY(-5px) scale(1.01);box-shadow:0 16px 40px rgba(0,0,0,0.4);}
.card-inner{overflow:hidden;border-radius:var(--radius);cursor:pointer;}
.card-img-wrap{position:relative;overflow:hidden;}
.card-img{width:100%;height:205px;object-fit:cover;display:block;transition:transform 0.4s ease;}
.card:hover .card-img{transform:scale(1.05);}
.card-img-placeholder{width:100%;height:205px;background:linear-gradient(135deg,var(--surface2),var(--surface3));display:flex;align-items:center;justify-content:center;font-size:50px;transition:transform 0.4s ease;}
.card:hover .card-img-placeholder{transform:scale(1.05);}
.card-img-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:75px;background:linear-gradient(to top,var(--surface),transparent);pointer-events:none;}
.card-body{padding:10px 12px 13px;}
.card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:6px;}
.card-meta{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap;}
.card-date{font-size:10px;color:var(--muted);}
.priority-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
.p-high{background:rgba(239,68,68,0.15);color:#ef4444;}
.p-mid{background:rgba(245,158,11,0.15);color:#f59e0b;}
.p-low{background:rgba(34,197,94,0.15);color:#22c55e;}
.card-bottom{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.status-badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.s-planned{background:var(--purple-bg);color:var(--purple);}
.s-watching{background:var(--blue-bg);color:var(--blue);}
.s-completed{background:var(--green-bg);color:var(--green);}
.card-score{font-size:12px;color:#f5a623;font-weight:700;}
.has-note-dot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);z-index:5;}

/* ══ 3-dot menu ══ */
.card-menu-wrap{position:absolute;top:9px;left:9px;z-index:10;}
.card-dots{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;opacity:0;transition:opacity 0.18s;line-height:1;letter-spacing:1px;}
.card:hover .card-dots,.social-card:hover .card-dots{opacity:1;}
.card-dots:hover{background:rgba(0,0,0,0.85);}
.card-dropdown{position:absolute;top:36px;left:0;background:var(--surface3);border:1px solid var(--border2);border-radius:12px;padding:5px;min-width:145px;box-shadow:0 12px 40px rgba(0,0,0,0.6);display:none;z-index:50;animation:dropIn 0.15s ease;}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.card-dropdown.open{display:block;}
.card-dropdown button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;background:transparent;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;border-radius:8px;cursor:pointer;transition:background 0.12s;text-align:right;}
.card-dropdown button:hover{background:var(--surface4);}
.card-dropdown button.del{color:var(--red);}
.card-dropdown button.del:hover{background:var(--red-bg);}
.card-dropdown .sep{height:1px;background:var(--border2);margin:4px 0;}

/* ══ Social Card ══ */
.social-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:visible;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);position:relative;display:flex;flex-direction:column;animation:cardIn 0.3s ease both;}
.social-card:hover{transform:translateY(-5px) scale(1.01);box-shadow:0 16px 40px rgba(0,0,0,0.4);}
.social-card.scat-موسيقى:hover{border-color:rgba(249,115,22,0.3);}
.social-card.scat-يوتيوب:hover{border-color:rgba(255,60,60,0.3);}
.social-card.scat-انستغرام:hover{border-color:rgba(193,53,132,0.3);}
.social-inner{overflow:hidden;border-radius:var(--radius);flex:1;display:flex;flex-direction:column;cursor:pointer;}
.social-cover-wrap{position:relative;overflow:hidden;}
.social-cover{width:100%;height:170px;object-fit:cover;display:block;transition:transform 0.4s ease;}
.social-card:hover .social-cover{transform:scale(1.05);}
.social-cover-placeholder{width:100%;height:170px;display:flex;align-items:center;justify-content:center;font-size:44px;transition:transform 0.4s ease;}
.social-card:hover .social-cover-placeholder{transform:scale(1.05);}
.scat-موسيقى .social-cover-placeholder{background:linear-gradient(135deg,#1a0f2e,#2d1a0e);}
.scat-يوتيوب .social-cover-placeholder{background:linear-gradient(135deg,#1a0000,#2d0808);}
.scat-انستغرام .social-cover-placeholder{background:linear-gradient(135deg,#1a0a18,#2d0d24);}
.social-cover-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to top,var(--surface),transparent);pointer-events:none;}
.social-body{padding:10px 12px 13px;flex:1;display:flex;flex-direction:column;gap:7px;}
.social-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;}
.social-meta{font-size:10px;color:var(--muted);}
.social-link-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;border:1px solid;border-radius:20px;padding:5px 12px;cursor:pointer;font-family:'Tajawal',sans-serif;text-decoration:none;transition:all 0.15s;width:fit-content;font-weight:600;}
.social-link-btn:hover{opacity:0.85;transform:translateY(-1px);}
.link-موسيقى{color:var(--music);background:var(--music-bg);border-color:rgba(249,115,22,0.2);}
.link-يوتيوب{color:var(--youtube);background:var(--youtube-bg);border-color:rgba(255,60,60,0.2);}
.link-انستغرام{color:var(--insta);background:var(--insta-bg);border-color:rgba(193,53,132,0.2);}
.social-no-link{font-size:12px;color:var(--muted);font-style:italic;}
.social-note{font-size:12px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);padding-top:7px;}

/* ══ Add card ══ */
.add-card{background:transparent;border:1.5px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:13px;gap:7px;transition:all 0.2s;min-height:120px;width:100%;}
.add-card .plus{font-size:26px;opacity:0.5;transition:all 0.2s;}
.add-card:hover .plus{opacity:1;transform:scale(1.1);}
.add-card.lib-add-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.add-card.social-add-card:hover{border-color:var(--music);color:var(--music);background:var(--music-bg);}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:4rem 0;font-size:14px;line-height:2.2;}

/* ══ Detail popup ══ */
.detail-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:300;align-items:center;justify-content:center;padding:1rem;}
.detail-bg.open{display:flex;}
.detail-popup{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);width:430px;max-width:100%;animation:modalIn 0.25s cubic-bezier(0.34,1.4,0.64,1);box-shadow:0 30px 80px rgba(0,0,0,0.7);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;}
.detail-img{width:100%;height:220px;object-fit:cover;flex-shrink:0;}
.detail-img-placeholder{width:100%;height:160px;background:linear-gradient(135deg,var(--surface3),var(--surface4));display:flex;align-items:center;justify-content:center;font-size:60px;flex-shrink:0;}
.detail-body{padding:1.4rem;overflow-y:auto;}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:1rem;}
.detail-title{font-family:'Cairo',sans-serif;font-size:20px;font-weight:900;line-height:1.3;}
.detail-close{background:var(--surface3);border:1px solid var(--border2);color:var(--muted2);font-size:15px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.detail-close:hover{color:var(--text);background:var(--surface4);}
.detail-badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1rem;}
.detail-cat{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600;background:var(--surface3);}
.detail-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.detail-row{display:flex;align-items:center;gap:10px;font-size:13px;}
.detail-row-label{color:var(--muted);min-width:90px;}
.detail-row-val{color:var(--text);font-weight:500;}
.detail-note-section{border-top:1px solid var(--border);padding-top:1rem;}
.detail-note-label{font-size:11px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.detail-note-text{font-size:14px;color:var(--text2);line-height:1.8;white-space:pre-wrap;}
.detail-note-empty{font-size:13px;color:var(--muted);font-style:italic;}
.detail-link-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;border:1px solid;border-radius:20px;padding:7px 16px;text-decoration:none;font-weight:600;margin-top:0.5rem;transition:all 0.15s;}
.detail-link-btn:hover{opacity:0.85;}

/* ══ Add/Edit Modal ══ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(8px);z-index:200;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:2rem;width:420px;max-width:100%;animation:modalIn 0.25s cubic-bezier(0.34,1.4,0.64,1);margin:auto;box-shadow:0 30px 80px rgba(0,0,0,0.7);}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-header h2{font-family:'Cairo',sans-serif;font-size:19px;font-weight:900;}
.modal-close-btn{background:var(--surface3);border:1px solid var(--border2);color:var(--muted2);font-size:15px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.modal-close-btn:hover{color:var(--text);}
.field{margin-bottom:1.05rem;}
.field label{display:block;font-size:11px;color:var(--muted2);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.field input,.field select,.field textarea{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;padding:10px 13px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;}
.field textarea{resize:vertical;min-height:75px;line-height:1.6;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.field select option{background:var(--surface2);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.img-field{margin-bottom:1.1rem;}
.img-field>label{display:block;font-size:11px;color:var(--muted2);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--radius-sm);min-height:120px;position:relative;transition:border-color 0.2s,background 0.2s;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-glow);}
.drop-zone.has-img{border-style:solid;border-color:var(--border2);}
.drop-empty{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted);font-size:13px;text-align:center;padding:1rem;pointer-events:none;}
.drop-empty .di{font-size:28px;}
.drop-empty .dt{color:var(--muted2);font-weight:500;}
.drop-empty .ds{font-size:11px;opacity:0.5;}
.drop-preview{width:100%;height:155px;object-fit:cover;display:none;}
.drop-zone.has-img .drop-preview{display:block;}
.drop-zone.has-img .drop-empty{display:none;}
.drop-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
.drop-zone.has-img:hover .drop-overlay{opacity:1;}
.drop-overlay span{font-size:13px;color:#fff;background:rgba(0,0,0,0.7);padding:6px 14px;border-radius:20px;}
.drop-actions{display:flex;gap:8px;margin-top:7px;}
.btn-upload{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;padding:8px 14px;cursor:pointer;flex:1;}
.btn-upload:hover{background:var(--surface4);}
.btn-remove-img{background:var(--red-bg);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);color:var(--red);font-family:'Tajawal',sans-serif;font-size:13px;padding:8px 12px;cursor:pointer;display:none;}
.has-img-actions .btn-remove-img{display:block;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;flex-wrap:wrap;}
.btn-cancel{background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--muted2);font-family:'Tajawal',sans-serif;font-size:14px;padding:9px 18px;cursor:pointer;}
.btn-cancel:hover{color:var(--text);}
.btn-save{border:none;border-radius:var(--radius-sm);color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;padding:9px 24px;cursor:pointer;transition:all 0.2s;}
.btn-save.lib-save{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 14px rgba(127,119,221,0.3);}
.btn-save.social-save{background:linear-gradient(135deg,#f97316,#c13584);}
.btn-danger{background:var(--red-bg);border:none;border-radius:var(--radius-sm);color:var(--red);font-family:'Tajawal',sans-serif;font-size:14px;padding:9px 16px;cursor:pointer;}
.btn-danger:hover{background:rgba(239,68,68,0.2);}

/* ══ Stats & Random pages ══ */
.fullpage-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;}
.fullpage-overlay.open{display:block;}
.fullpage-inner{max-width:700px;margin:0 auto;padding:2rem 1.25rem 5rem;}
.fullpage-header{display:flex;align-items:center;gap:12px;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.page-back{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;padding:8px 16px;cursor:pointer;}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem;}

.stats-section{margin-bottom:2rem;}

.progress-label{font-size:13px;font-weight:600;min-width:85px;display:flex;align-items:center;gap:5px;}
.progress-bar-wrap{flex:1;height:7px;background:var(--surface3);border-radius:20px;overflow:hidden;}
.progress-bar{height:100%;border-radius:20px;transition:width 0.7s ease;}
.progress-count{font-size:12px;color:var(--muted);min-width:35px;text-align:left;}
.random-wrap{text-align:center;padding:2rem 1rem;}
.random-spin-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--radius);padding:15px 36px;font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(127,119,221,0.4);margin-bottom:2rem;}
.random-spin-btn:hover{transform:translateY(-2px);}
.random-result{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;max-width:280px;margin:0 auto;animation:cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.random-result img{width:100%;height:200px;object-fit:cover;}
.random-result-placeholder{width:100%;height:170px;display:flex;align-items:center;justify-content:center;font-size:56px;background:linear-gradient(135deg,var(--surface2),var(--surface3));}
.random-result-body{padding:1.1rem;}
.random-result-name{font-family:'Cairo',sans-serif;font-size:18px;font-weight:900;margin-bottom:6px;}
.random-result-cat{font-size:12px;color:var(--muted);}
.random-empty{color:var(--muted);font-size:14px;padding:2rem;}
.random-filter{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem;}
.random-filter-btn{padding:6px 14px;border-radius:20px;font-family:'Tajawal',sans-serif;font-size:13px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all 0.15s;}
.random-filter-btn.active{background:var(--surface3);color:var(--text);border-color:var(--border3);font-weight:600;}

/* ══ Login Button (Firebase ready) ══ */
.login-btn{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.login-btn:hover{background:var(--surface3);border-color:var(--border3);}
.login-btn .avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;display:none;}
.login-btn .avatar.show{display:block;}
.login-btn .login-text{}

/* ══ Toast ══ */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);border-radius:30px;padding:10px 24px;font-size:13px;font-weight:600;color:var(--text);z-index:9999;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,0.5);pointer-events:none;opacity:0;visibility:hidden;transition:opacity 0.3s ease,visibility 0.3s ease;}
.toast.show{opacity:1;visibility:visible;}

@media(max-width:680px){
  .stats{display:grid;grid-template-columns:repeat(2,1fr);}
  .cat-btn{font-size:12px;padding:7px 5px;}
  .cat-btn .cnt{display:none;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:11px;}
  .card-img,.card-img-placeholder,.social-cover,.social-cover-placeholder{height:170px;}
  .field-row{grid-template-columns:1fr;}
  .nav-tab{padding:8px 12px;font-size:13px;}
}
</style>
</head>

<script>
// ══ CONFIG ══
const LIB_CATS=[
  {id:'أنمي',icon:'🎌',color:'var(--anime)',glow:'var(--anime-glow)',border:'rgba(232,81,122,0.3)'},
  {id:'مانغا',icon:'📕',color:'var(--manga)',glow:'var(--manga-glow)',border:'rgba(232,121,160,0.3)'},
  {id:'كتب',icon:'📖',color:'var(--books)',glow:'var(--books-glow)',border:'rgba(78,154,241,0.3)'},
  {id:'ألعاب',icon:'🎮',color:'var(--games)',glow:'var(--games-glow)',border:'rgba(81,201,106,0.3)'},
  {id:'أفلام',icon:'🎬',color:'var(--films)',glow:'var(--films-glow)',border:'rgba(245,166,35,0.3)'},
  {id:'مسلسلات',icon:'📺',color:'var(--series)',glow:'var(--series-glow)',border:'rgba(168,85,247,0.3)'},
];
const SOCIAL_CATS=[
  {id:'موسيقى',icon:'🎵',color:'var(--music)',glow:'var(--music-glow)',border:'rgba(249,115,22,0.3)',linkLabel:'▶ استمع الآن',linkClass:'link-موسيقى'},
  {id:'يوتيوب',icon:'▶️',color:'var(--youtube)',glow:'var(--youtube-glow)',border:'rgba(255,60,60,0.3)',linkLabel:'▶ شاهد الآن',linkClass:'link-يوتيوب'},
  {id:'انستغرام',icon:'📸',color:'var(--insta)',glow:'var(--insta-glow)',border:'rgba(193,53,132,0.3)',linkLabel:'🔗 فتح الحساب',linkClass:'link-انستغرام'},
];
const ALL_CATS=[...LIB_CATS,...SOCIAL_CATS];
const STATUS_LABEL={planned:'أرغب بمشاهدته',watching:'أشاهده حالياً',completed:'تمت المشاهدة'};
const STATUS_CLASS={planned:'s-planned',watching:'s-watching',completed:'s-completed'};
const STATUSES=['الكل','أرغب بمشاهدته','أشاهده حالياً','تمت المشاهدة'];
const PRIORITY_LABEL={high:'عالية',mid:'متوسطة',low:'منخفضة'};
const PRIORITY_CLASS={high:'p-high',mid:'p-mid',low:'p-low'};
const PRIORITY_ORDER={high:0,mid:1,low:2,'':3};
const SK='maktabati_v8';
window.SK=SK;

// ══ SORT ══
function sortItems(arr,sortId){
  const s=document.getElementById(sortId).value;
  const copy=[...arr];
  if(s==='date-desc')return copy.sort((a,b)=>(b.dateAdded||0)-(a.dateAdded||0));
  if(s==='date-asc') return copy.sort((a,b)=>(a.dateAdded||0)-(b.dateAdded||0));
  if(s==='name')     return copy.sort((a,b)=>a.name.localeCompare(b.name,'ar'));
  if(s==='score-desc')return copy.sort((a,b)=>(b.score||0)-(a.score||0));
  if(s==='priority') return copy.sort((a,b)=>PRIORITY_ORDER[a.priority||'']-PRIORITY_ORDER[b.priority||'']);
  return copy;
}
function formatDate(ts){if(!ts)return'';return new Date(ts).toLocaleDateString('ar-SA',{year:'numeric',month:'short',day:'numeric'});}
function matchSearch(i,q){if(!q)return true;const ql=q.toLowerCase();return i.name.toLowerCase().includes(ql)||(i.note||'').toLowerCase().includes(ql)||(i.score&&String(i.score).includes(ql));}

function openDetail(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  const cat=catCfg(item.cat);const sc=SOCIAL_CATS.find(c=>c.id===item.cat);
  document.getElementById('detail-img-area').innerHTML=item.img
    ?`<img class="detail-img" src="${item.img}">`
    :`<div class="detail-img-placeholder">${cat.icon}</div>`;
  document.getElementById('detail-title').textContent=item.name;
  let b=`<span class="detail-cat">${cat.icon} ${cat.id}</span>`;
  if(item.status)b+=`<span class="status-badge ${STATUS_CLASS[item.status]}">${STATUS_LABEL[item.status]}</span>`;
  if(item.priority)b+=`<span class="priority-badge ${PRIORITY_CLASS[item.priority]}">${PRIORITY_LABEL[item.priority]}</span>`;
  document.getElementById('detail-badges').innerHTML=b;

  if(item.score)r+=`<div class="detail-row"><span class="detail-row-label">التقييم</span><span class="detail-row-val">★ ${item.score}/10</span></div>`;
  if(item.chapter)r+=`<div class="detail-row"><span class="detail-row-label">آخر فصل</span><span class="detail-row-val">📖 فصل ${item.chapter}</span></div>`;

  document.getElementById('detail-rows').innerHTML=r;

function triggerFileInput(){document.getElementById('img-file-input').click();}
function handleFileInput(e){const f=e.target.files[0];if(f)processImg(f);e.target.value='';}
function processImg(file){if(!file.type.startsWith('image/'))return;const r=new FileReader();r.onload=ev=>setImage(ev.target.result);r.readAsDataURL(file);}
function setImage(d){currentImgData=d;document.getElementById('drop-preview').src=d;document.getElementById('drop-zone').classList.add('has-img');document.getElementById('drop-actions').classList.add('has-img-actions');}
function removeImage(){currentImgData='';document.getElementById('drop-preview').src='';document.getElementById('drop-zone').classList.remove('has-img');document.getElementById('drop-actions').classList.remove('has-img-actions');}
function resetImgUI(){removeImage();document.getElementById('img-file-input').value='';}
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)processImg(f);});
dz.addEventListener('click',()=>{if(dz.classList.contains('has-img'))triggerFileInput();});

  const cat=document.getElementById('f-cat').value;
  const social=isSocial(cat);

  document.getElementById('social-modal-fields').style.display=social?'block':'none';

function openAdd(presetCat, tab){
  editingId=null;resetImgUI();
  document.getElementById('modal-title').textContent='إضافة عنصر جديد';
  document.getElementById('modal-save-btn').textContent='إضافة';
  document.getElementById('f-name').value='';
  const defaultCat=presetCat||(tab==='social'?activeSocialCat:activeLibCat);
  document.getElementById('f-cat').value=defaultCat;
  document.getElementById('f-status').value='planned';
  document.getElementById('f-score').value='';
  document.getElementById('f-link').value='';
  document.getElementById('f-priority').value='';
  document.getElementById('f-note').value='';
  document.getElementById('f-chapter').value='';
  onCatChange();
  const del=document.getElementById('btn-delete');if(del)del.remove();
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),120);
}

function openEdit(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  editingId=id;resetImgUI();
  document.getElementById('modal-title').textContent='تعديل العنصر';
  document.getElementById('modal-save-btn').textContent='حفظ التعديلات';
  document.getElementById('f-name').value=item.name;
  document.getElementById('f-cat').value=item.cat;
  document.getElementById('f-status').value=item.status||'planned';
  document.getElementById('f-score').value=item.score||'';
  document.getElementById('f-link').value=item.link||'';
  document.getElementById('f-priority').value=item.priority||'';
  document.getElementById('f-note').value=item.note||'';
  document.getElementById('f-chapter').value=item.chapter||'';
  onCatChange();
  if(item.img)setImage(item.img);
  const actions=document.getElementById('modal-actions');
  if(!document.getElementById('btn-delete')){
    const btn=document.createElement('button');
    btn.className='btn-danger';btn.id='btn-delete';btn.textContent='🗑 حذف';
    btn.onclick=()=>deleteItem(id);
    actions.insertBefore(btn,actions.firstChild);
  }
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(){document.getElementById('modal-bg').classList.remove('open');const del=document.getElementById('btn-delete');if(del)del.remove();}

function saveItem(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  const cat=document.getElementById('f-cat').value;
  const social=isSocial(cat);
  const status=social?null:document.getElementById('f-status').value;
  const sv=document.getElementById('f-score').value;
  const score=(!social&&sv)?Math.min(10,Math.max(1,parseInt(sv))):null;
  const link=social?document.getElementById('f-link').value.trim():'';
  const priority=social?'':document.getElementById('f-priority').value;
  const note=document.getElementById('f-note').value.trim();
  const cv=document.getElementById('f-chapter').value;
  const chapter=(!social&&cat==='مانغا'&&cv)?parseInt(cv):null;
  const img=currentImgData||'';
  if(editingId){
    const idx=items.findIndex(i=>i.id===editingId);
    if(idx>-1)items[idx]={...items[idx],name,cat,status,score,link,priority,note,chapter,img};
    showToast('تم الحفظ ✓');
  } else {
    items.unshift({id:nextId++,name,cat,status,score,link,priority,note,chapter,img,dateAdded:Date.now()});
    if(social){activeSocialCat=cat;switchPage('social');}
    else{activeLibCat=cat;catStatus[cat]='الكل';switchPage('lib');}
    showToast('تمت الإضافة ✓');
  }
  save();closeModal();
  if(activePage==='lib')renderLib(); else renderSocial();
}

function deleteItem(id){
  items=items.filter(i=>i.id!==id);save();closeModal();
  if(activePage==='lib')renderLib(); else renderSocial();
  showToast('تم الحذف');
}

// ══ STATS ══
function openStatsPage(){
  const libItems=items.filter(i=>isLib(i.cat));
  const scored=libItems.filter(i=>i.score);
  const avg=scored.length?(scored.reduce((s,i)=>s+i.score,0)/scored.length).toFixed(1):'-';
  const maxCat=ALL_CATS.map(c=>({...c,count:items.filter(i=>i.cat===c.id).length})).sort((a,b)=>b.count-a.count)[0];
  let html=`<div class="stats-grid">
    <div class="stats-card"><div class="num">${items.length}</div><div class="lbl">إجمالي الكل</div></div>
    <div class="stats-card"><div class="num">${libItems.filter(i=>i.status==='completed').length}</div><div class="lbl">✅ أتممته</div></div>
    <div class="stats-card"><div class="num">${libItems.filter(i=>i.status==='watching').length}</div><div class="lbl">⏳ جارٍ</div></div>
    <div class="stats-card"><div class="num">${libItems.filter(i=>i.status==='planned').length}</div><div class="lbl">📌 مخطط</div></div>
    <div class="stats-card"><div class="num">${avg}</div><div class="lbl">⭐ متوسط التقييم</div></div>
    <div class="stats-card"><div class="num">${maxCat?.count||0}</div><div class="lbl">أكثر قسم ${maxCat?.icon||''} ${maxCat?.id||''}</div></div>
  </div>`;
  html+=`<div class="stats-section"><div class="stats-section-title">📚 تقدم المكتبة</div>`;
  LIB_CATS.forEach(cat=>{
    const ci=items.filter(i=>i.cat===cat.id);if(!ci.length)return;
    const done=ci.filter(i=>i.status==='completed').length;
    const pct=Math.round((done/ci.length)*100);
    html+=`<div class="progress-row"><div class="progress-label">${cat.icon} ${cat.id}</div><div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:${cat.color}"></div></div><div class="progress-count">${done}/${ci.length}</div></div>`;
  });
  html+=`</div>`;
  if(scored.length){
    html+=`<div class="stats-section"><div class="stats-section-title">★ متوسط التقييم</div>`;
    LIB_CATS.forEach(cat=>{
      const sc=items.filter(i=>i.cat===cat.id&&i.score);if(!sc.length)return;
      const a=(sc.reduce((s,i)=>s+i.score,0)/sc.length).toFixed(1);
      html+=`<div class="progress-row"><div class="progress-label">${cat.icon} ${cat.id}</div><div class="progress-bar-wrap"><div class="progress-bar" style="width:${(a/10)*100}%;background:${cat.color}"></div></div><div class="progress-count">★${a}</div></div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('stats-page-content').innerHTML=html;
  document.getElementById('stats-page').classList.add('open');
}
function closeStatsPage(){document.getElementById('stats-page').classList.remove('open');}

// ══ RANDOM ══
function openRandom(){randomCat='الكل';renderRandomFilter();document.getElementById('random-result').innerHTML='';document.getElementById('random-page').classList.add('open');}
function closeRandom(){document.getElementById('random-page').classList.remove('open');}
function renderRandomFilter(){
  document.getElementById('random-filter').innerHTML=['الكل',...LIB_CATS.map(c=>c.id)].map(f=>`
    <button class="random-filter-btn${randomCat===f?' active':''}" onclick="setRandomCat('${f}')">${f}</button>`).join('');
}
function setRandomCat(c){randomCat=c;renderRandomFilter();document.getElementById('random-result').innerHTML='';}
function spinRandom(){
  let pool=items.filter(i=>i.status==='planned'&&isLib(i.cat));
  if(randomCat!=='الكل')pool=pool.filter(i=>i.cat===randomCat);
  if(!pool.length){document.getElementById('random-result').innerHTML=`<div class="random-empty">لا يوجد عناصر في قائمة "أرغب بمشاهدته" 😅</div>`;return;}
  const item=pool[Math.floor(Math.random()*pool.length)];
  const cat=catCfg(item.cat);
  document.getElementById('random-result').innerHTML=`
    <div class="random-result">
      ${item.img?`<img src="${item.img}">`:`<div class="random-result-placeholder">${cat.icon}</div>`}
      <div class="random-result-body">
        <div class="random-result-name">${item.name}</div>
        <div class="random-result-cat">${cat.icon} ${cat.id}</div>
        ${item.priority?`<span class="priority-badge ${PRIORITY_CLASS[item.priority]}">${PRIORITY_LABEL[item.priority]}</span>`:''}
      </div>
    </div>`;
}

let _toastTimer=null;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{t.classList.remove("show");_toastTimer=null;},2500);
}

// ══ EVENTS ══
document.getElementById('lib-search').addEventListener('input',e=>{libSearch=e.target.value;renderLib();});
document.getElementById('social-search').addEventListener('input',e=>{socialSearch=e.target.value;renderSocial();});
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
document.getElementById('detail-bg').addEventListener('click',e=>{if(e.target===document.getElementById('detail-bg'))closeDetail();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeDetail();closeStatsPage();closeRandom();}});

// ══ INIT ══
window.renderLib=renderLib;
window.renderSocial=renderSocial;
window.showToast=showToast;
window.save=save;
renderLib();
renderSocial();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

// ── إعداد Firebase ──
const firebaseConfig = {
  apiKey: "AIzaSyAv7_et0tR4QcJYgTcSI0vQHPjtb9wLeTY",
  authDomain: "my-library-179.firebaseapp.com",
  projectId: "my-library-179",
  storageBucket: "my-library-179.firebasestorage.app",
  messagingSenderId: "447037989932",
  appId: "1:447037989932:web:fe28b970ff4d3b14e49d89",
  measurementId: "G-77K7EB9B60"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let unsubscribeSnapshot = null; // لإيقاف الاستماع عند تسجيل الخروج

// ── حفظ البيانات على Firestore ──
async function saveToCloud(uid) {
  try {
    await setDoc(doc(db, "users", uid), {
      items: window.items,
      nextId: window.nextId,
      updatedAt: Date.now()
    });
  } catch(e) {
    console.error("خطأ في الحفظ:", e);
    window.showToast("⚠️ فشل الحفظ على السحابة");
  }
}

// ── تحميل البيانات من Firestore والاستماع للتغييرات ──
function listenToCloud(uid) {
  // إيقاف الاستماع القديم إن وجد
  if (unsubscribeSnapshot) unsubscribeSnapshot();

  const ref = doc(db, "users", uid);
  unsubscribeSnapshot = onSnapshot(ref, (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      window.items  = data.items  || [];
      window.nextId = data.nextId || (window.items.length ? Math.max(...window.items.map(i=>i.id),0)+1 : 1);
      // حفظ نسخة محلية للعمل دون إنترنت
      try { localStorage.setItem(window.SK, JSON.stringify(window.items)); } catch(e) {}
      window.renderLib();
      window.renderSocial();
    }
  });
}

// ── override دالة save لترسل للسحابة إذا كان المستخدم مسجلاً ──
const _originalSave = window.save;
window.save = function() {
  _originalSave(); // احفظ محلياً أولاً
  const user = auth.currentUser;
  if (user) saveToCloud(user.uid);
};

// ── تسجيل الدخول بـ Google ──
window.handleLogin = function() {
  const user = auth.currentUser;
  if (user) {
    if (!confirm(`هل تريد تسجيل الخروج من حساب ${user.displayName}؟`)) return;
    if (unsubscribeSnapshot) unsubscribeSnapshot();
    signOut(auth).then(() => {
      window.showToast("تم تسجيل الخروج");
    }).catch(e => {
      console.error(e);
      window.showToast("⚠️ فشل تسجيل الخروج");
    });
  } else {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider).catch(e => {
      console.error("Login error:", e.code, e.message);
      if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
        window.showToast("⚠️ " + (e.code || 'فشل تسجيل الدخول'));
      }
    });
  }
};

// ── مراقبة حالة المستخدم ──
onAuthStateChanged(auth, (user) => {
  if (user) {
    // تحديث UI
    const name = user.displayName || "مرحباً";
    document.querySelectorAll('.login-text').forEach(el => el.textContent = name);
    document.querySelectorAll('.avatar').forEach(el => {
      if (user.photoURL) { el.src = user.photoURL; el.classList.add('show'); }
      else el.classList.remove('show');
    });
    window.showToast(`مرحباً ${name} 👋`);

    // ابدأ الاستماع للبيانات من السحابة
    listenToCloud(user.uid);
  } else {
    // تسجيل الخروج → أعد UI
    document.querySelectorAll('.login-text').forEach(el => el.textContent = "تسجيل الدخول");
    document.querySelectorAll('.avatar').forEach(el => { el.src=''; el.classList.remove('show'); });
    if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
    // أعد تحميل البيانات المحلية
    window.items = window._loadLocal();
    window.renderLib();
    window.renderSocial();
  }
});
</script>
